<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300">
  <!-- Definitions for gradients and patterns -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>
    
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61DAFB" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <!-- Neural Network Nodes Pattern -->
    <pattern id="nodes" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#333" />
      <circle cx="100" cy="50" r="2" fill="#333" />
      <circle cx="50" cy="120" r="2" fill="#333" />
      <circle cx="130" cy="130" r="2" fill="#333" />
      <line x1="20" y1="20" x2="100" y2="50" stroke="#222" stroke-width="1" />
      <line x1="100" y1="50" x2="50" y2="120" stroke="#222" stroke-width="1" />
      <line x1="50" y1="120" x2="130" y2="130" stroke="#222" stroke-width="1" />
      <line x1="130" y1="130" x2="20" y2="20" stroke="#222" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bg-grad)" rx="10" />
  
  <!-- Subtle Geometry / AI pattern -->
  <rect width="1000" height="300" fill="url(#nodes)" rx="10" />
  
  <!-- Abstract Shapes for depth -->
  <circle cx="950" cy="-50" r="250" fill="none" stroke="#222" stroke-width="2" />
  <circle cx="950" cy="-50" r="150" fill="none" stroke="#61DAFB" stroke-width="0.5" opacity="0.3" />
  <path d="M -50 250 Q 150 400 350 250" fill="none" stroke="#222" stroke-width="1.5" />

  <!-- Content Group -->
  <g transform="translate(60, 0)">
    <!-- Main Name -->
    <text x="0" y="110" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff" letter-spacing="3">MOHAMMAD HUZAIFA</text>
    
    <!-- Title with Accent -->
    <text x="0" y="160" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="url(#accent-grad)" letter-spacing="1.5">AI ENGINEER</text>

    <!-- Specialties Row 1 -->
    <text x="0" y="220" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#a0a0a0" letter-spacing="1">MACHINE LEARNING</text>
    <circle cx="160" cy="216" r="3" fill="#61DAFB" />
    <text x="180" y="220" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#a0a0a0" letter-spacing="1">BACKEND DEVELOPMENT</text>
    <circle cx="380" cy="216" r="3" fill="#61DAFB" />
    <text x="400" y="220" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#a0a0a0" letter-spacing="1">GENERATIVE AI</text>

    <!-- Specialties Row 2 -->
    <text x="0" y="250" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#a0a0a0" letter-spacing="1">LLMS</text>
    <circle cx="50" cy="246" r="3" fill="#61DAFB" />
    <text x="70" y="250" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#a0a0a0" letter-spacing="1">DATA ANALYTICS</text>
    <circle cx="215" cy="246" r="3" fill="#61DAFB" />
    <text x="235" y="250" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#a0a0a0" letter-spacing="1">AUTONOMOUS SYSTEMS</text>
  </g>

  <!-- Side decorative bar -->
  <rect x="0" y="60" width="8" height="180" fill="#61DAFB" rx="4" />
</svg>
