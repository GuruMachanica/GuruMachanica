<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 160" width="450" height="160">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141414" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61DAFB" />
      <stop offset="100%" stop-color="#4a90e2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="448" height="158" x="1" y="1" fill="url(#card-grad)" rx="10" stroke="#2a2a2a" stroke-width="1.5" />
  
  <!-- Accent Line -->
  <rect width="6" height="60" x="15" y="25" fill="url(#accent)" rx="3" />

  <!-- Title & Icon -->
  <text x="35" y="45" font-family="'Segoe UI', Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ffffff">A.E.G.I.S.</text>
  
  <!-- Description -->
  <text x="35" y="75" font-family="'Segoe UI', Helvetica, sans-serif" font-size="14" fill="#a0a0a0">Audio-based Edge Guard for Intelligent</text>
  <text x="35" y="95" font-family="'Segoe UI', Helvetica, sans-serif" font-size="14" fill="#a0a0a0">Scam Prevention system.</text>

  <!-- Tags Backgrounds -->
  <rect width="65" height="24" x="35" y="115" fill="#222" rx="4" />
  <rect width="70" height="24" x="110" y="115" fill="#222" rx="4" />
  <rect width="75" height="24" x="190" y="115" fill="#222" rx="4" />

  <!-- Tags Text -->
  <text x="45" y="132" font-family="'Segoe UI', Helvetica, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">Python</text>
  <text x="120" y="132" font-family="'Segoe UI', Helvetica, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">PyTorch</text>
  <text x="200" y="132" font-family="'Segoe UI', Helvetica, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">Audio ML</text>
  
  <!-- Arrow / Link Icon -->
  <g transform="translate(410, 30)">
    <circle cx="10" cy="10" r="14" fill="#1a1a1a" stroke="#333" stroke-width="1" />
    <path d="M 6 14 L 14 6 M 9 6 L 14 6 L 14 11" fill="none" stroke="#61DAFB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
